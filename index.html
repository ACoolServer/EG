<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACoolServer</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
@font-face {
  font-family: 'Minecraft';
  src: url('Minecraft.ttf') format('truetype');
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#0d1b2a;
font-family:'Minecraft','Press Start 2P',monospace;
color:white;
overflow-x:hidden;
}

/* stars */
#stars{
position:fixed;
inset:0;
pointer-events:none;
z-index:0;
}

.star{
position:absolute;
width:2px;height:2px;
background:white;
animation:twinkle 2s infinite;
}

@keyframes twinkle{50%{opacity:0;}}

/* layout */
.container{
position:relative;
z-index:2;
max-width:600px;
margin:auto;
padding:10px;
}

/* title */
.title{
text-align:center;
font-size:14px;
margin:10px 0 15px;
animation:float 2s infinite;
text-shadow:2px 2px 0 black;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-4px);}
}

/* panels */
.mc-panel{
background:#c6c6c6;
border:3px solid #000;
box-shadow: inset -2px -2px 0 #555, inset 2px 2px 0 #fff;
margin-bottom:10px;
}

.mc-header{
background:#8b8b8b;
color:black;
text-align:center;
padding:6px;
font-size:8px;
border-bottom:3px solid #000;
}

.mc-body{
background:#aaaaaa;
padding:8px;
}

/* rows */
.mc-row{
display:flex;
justify-content:space-between;
align-items:center;
background:#8b8b8b;
border:2px solid #000;
padding:6px;
margin-bottom:6px;
color:black;
font-size:7px;
}

/* buttons */
.mc-btn{
background:#c6c6c6;
border:2px solid #000;
padding:4px;
font-size:6px;
font-family:'Minecraft','Press Start 2P';
cursor:pointer;
}

.big-btn{
display:block;
text-align:center;
padding:7px;
margin-top:6px;
background:#c6c6c6;
border:3px solid #000;
font-size:7px;
color:black;
text-decoration:none;
}

/* motd */
.motd{
font-size:7px;
margin-bottom:6px;
color:black;
}

/* notification */
.notification{
position:fixed;
bottom:10px;
left:10px;
background:black;
color:#55ff55;
padding:6px;
font-size:7px;
display:none;
z-index:10;
}
.notification.show{display:block;}
</style>
</head>

<body>

<div id="stars"></div>

<div class="container">

<div class="title">Mohamed's Servers</div>

<!-- JAVA -->
<div class="mc-panel">
<div class="mc-header">JAVA EDITION</div>
<div class="mc-body">

<div class="mc-row">
<span>ACoolServerEG.aternos.me</span>
<button class="mc-btn" onclick="copyText('ACoolServer.aternos.me')">COPY</button>
</div>

<div id="java-motd" class="motd">Loading...</div>

<div class="mc-row">
<span>PLAYERS</span>
<span id="java-players">...</span>
</div>

</div>
</div>

<!-- BEDROCK -->
<div class="mc-panel">
<div class="mc-header">BEDROCK EDITION</div>
<div class="mc-body">

<div class="mc-row">
<span>ACoolServerBE.aternos.me</span>
<button class="mc-btn" onclick="copyText('ACoolServerBE.aternos.me')">COPY</button>
</div>

<div class="mc-row">
<span>PORT 48917</span>
<button class="mc-btn" onclick="copyText('48917')">COPY</button>
</div>

<div id="bedrock-motd" class="motd">Loading...</div>

<div class="mc-row">
<span>PLAYERS</span>
<span id="bedrock-players">...</span>
</div>

<a class="big-btn" href="minecraft://?addExternalServer=ACoolServerBE|ACoolServerBE.aternos.me:48917">
ADD TO BEDROCK
</a>

</div>
</div>

</div>

<div id="notif" class="notification">Copied!</div>

<script>
// stars
const stars=document.getElementById("stars");
for(let i=0;i<60;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";
stars.appendChild(s);
}

// copy
function copyText(t){
navigator.clipboard.writeText(t);
let n=document.getElementById("notif");
n.classList.add("show");
setTimeout(()=>n.classList.remove("show"),1200);
}

// MOTD colors
function formatMOTD(text){
const colors={
"0":"#000000","1":"#0000AA","2":"#00AA00","3":"#00AAAA",
"4":"#AA0000","5":"#AA00AA","6":"#FFAA00","7":"#AAAAAA",
"8":"#555555","9":"#5555FF","a":"#55FF55","b":"#55FFFF",
"c":"#FF5555","d":"#FF55FF","e":"#FFFF55","f":"#FFFFFF"
};

let result="",open=false;

for(let i=0;i<text.length;i++){
if(text[i]=="§"){
let code=text[i+1]?.toLowerCase();

if(colors[code]){
if(open) result+="</span>";
result+=`<span style="color:${colors[code]}">`;
open=true;
i++;
continue;
}

if(code==="r"){
if(open) result+="</span>";
open=false;
i++;
continue;
}
}
result+=text[i];
}

if(open) result+="</span>";
return result;
}

// JAVA STATUS
async function updateJava(){
try{
let res=await fetch("https://api.mcsrvstat.us/2/ACoolServer.aternos.me");
let data=await res.json();

if(data.online){
document.getElementById("java-players").innerText =
data.players.online + "/" + data.players.max;

document.getElementById("java-motd").innerHTML =
formatMOTD(data.motd.raw.join(" "));
}else{
document.getElementById("java-players").innerText="0/0";
document.getElementById("java-motd").innerText="Offline";
}
}catch{}
}

// BEDROCK STATUS
async function updateBedrock(){
try{
let res=await fetch("https://api.mcsrvstat.us/bedrock/2/ACoolServerBE.aternos.me:48917");
let data=await res.json();

if(data.online){
document.getElementById("bedrock-players").innerText =
data.players.online + "/" + data.players.max;

document.getElementById("bedrock-motd").innerHTML =
formatMOTD(data.motd.raw.join(" "));
}else{
document.getElementById("bedrock-players").innerText="0/0";
document.getElementById("bedrock-motd").innerText="Offline";
}
}catch{}
}

// update loop
updateJava();
updateBedrock();
setInterval(()=>{
updateJava();
updateBedrock();
},10000);
</script>

</body>
</html>
