<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohamed's Servers</title>
<style>
  @font-face {
    font-family: 'Minecraft';
    src: url('Minecraft.ttf') format('truetype');
  }

  :root {
    --dirt-dark: #5a3a1a;
    --dirt-mid: #8b5a2b;
    --grass-top: #5d9e3f;
    --grass-side: #4a7d32;
    --stone: #888888;
    --stone-dark: #5a5a5a;
    --wood: #a0723a;
    --wood-dark: #7a5228;
    --ui-bg: #1a1a1aee;
    --ui-border: #555555;
    --ui-border-light: #aaaaaa;
    --btn-normal: #555555;
    --btn-hover: #6b6b6b;
    --btn-shadow: #333333;
    --btn-highlight: #888888;
    --java-green: #55ff55;
    --bedrock-blue: #5555ff;
    --gold: #ffaa00;
    --red: #ff5555;
    --yellow: #ffff55;
    --aqua: #55ffff;
    --white: #ffffff;
    --gray: #aaaaaa;
    --dark-gray: #555555;
    --pink: #ff55ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Minecraft', monospace;
    background-color: #1a1a2e;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 31px, rgba(0,0,0,0.15) 31px, rgba(0,0,0,0.15) 32px),
      repeating-linear-gradient(90deg, transparent, transparent 31px, rgba(0,0,0,0.15) 31px, rgba(0,0,0,0.15) 32px);
    background-size: 32px 32px;
    min-height: 100vh;
    overflow-x: hidden;
    color: white;
    image-rendering: pixelated;
  }

  /* Animated background stars */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(1px 1px at 10% 20%, white, transparent),
      radial-gradient(1px 1px at 30% 80%, white, transparent),
      radial-gradient(1px 1px at 60% 15%, white, transparent),
      radial-gradient(1px 1px at 75% 60%, white, transparent),
      radial-gradient(1px 1px at 90% 35%, white, transparent),
      radial-gradient(1px 1px at 50% 50%, rgba(255,255,255,0.4), transparent),
      radial-gradient(2px 2px at 20% 45%, rgba(255,255,255,0.6), transparent),
      radial-gradient(1px 1px at 85% 80%, white, transparent);
    pointer-events: none;
    z-index: 0;
  }

  .sky-gradient {
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg,
      #0a0a2e 0%,
      #1a1a4a 25%,
      #2a3a6a 50%,
      #1a2a4a 75%,
      #0a1a2a 100%
    );
    z-index: -1;
  }

  /* Floating particles */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #55ff55;
    opacity: 0;
    animation: float-up 8s infinite;
    image-rendering: pixelated;
  }
  .particle:nth-child(2) { left: 20%; animation-delay: 1s; background: #ffaa00; }
  .particle:nth-child(3) { left: 40%; animation-delay: 2s; background: #55ffff; }
  .particle:nth-child(4) { left: 60%; animation-delay: 3s; background: #ff55ff; }
  .particle:nth-child(5) { left: 80%; animation-delay: 4s; background: #ffff55; }
  .particle:nth-child(6) { left: 10%; animation-delay: 5s; background: #ffffff; }
  .particle:nth-child(7) { left: 70%; animation-delay: 6s; background: #55ff55; }
  .particle:nth-child(8) { left: 50%; animation-delay: 7s; background: #ffaa00; }
  @keyframes float-up {
    0% { bottom: -10px; opacity: 0; transform: translateX(0); }
    10% { opacity: 0.8; }
    90% { opacity: 0.4; }
    100% { bottom: 100vh; opacity: 0; transform: translateX(20px); }
  }

  /* Main container */
  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 40px;
    padding-top: 20px;
  }

  .header-title {
    font-size: clamp(20px, 5vw, 36px);
    color: #ffaa00;
    text-shadow:
      3px 3px 0 #7a5200,
      -1px -1px 0 #000,
      1px -1px 0 #000,
      -1px 1px 0 #000,
      1px 1px 0 #000;
    letter-spacing: 2px;
    animation: title-pulse 3s ease-in-out infinite;
    display: block;
    line-height: 1.4;
  }
  .header-title span {
    color: #55ff55;
    text-shadow:
      3px 3px 0 #1a7a1a,
      -1px -1px 0 #000,
      1px -1px 0 #000,
      -1px 1px 0 #000,
      1px 1px 0 #000;
  }
  @keyframes title-pulse {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.2); }
  }

  .header-subtitle {
    margin-top: 10px;
    font-size: 12px;
    color: #aaaaaa;
    text-shadow: 1px 1px 0 #000;
    letter-spacing: 1px;
  }

  /* Pixelated divider */
  .divider {
    height: 8px;
    background: repeating-linear-gradient(90deg,
      #5d9e3f 0px, #5d9e3f 16px,
      #4a7d32 16px, #4a7d32 32px,
      #5d9e3f 32px
    );
    box-shadow: 0 4px 0 #3a5a20, 0 -2px 0 #7aca55;
    margin: 20px 0;
    image-rendering: pixelated;
  }

  /* Cards grid */
  .cards-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 600px) {
    .cards-grid { grid-template-columns: 1fr; }
  }

  /* Minecraft card */
  .mc-card {
    background: #1a1a1a;
    border: 3px solid #555555;
    border-top-color: #888888;
    border-left-color: #888888;
    border-bottom-color: #333333;
    border-right-color: #333333;
    padding: 16px;
    position: relative;
    box-shadow:
      inset 1px 1px 0 #666666,
      inset -1px -1px 0 #222222,
      4px 4px 0 rgba(0,0,0,0.6);
    animation: card-in 0.4s ease both;
  }
  .mc-card:nth-child(2) { animation-delay: 0.1s; }

  @keyframes card-in {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 2px solid #333;
  }

  .card-icon {
    width: 40px;
    height: 40px;
    image-rendering: pixelated;
    flex-shrink: 0;
  }

  .card-title {
    font-size: 14px;
    letter-spacing: 1px;
  }

  .bedrock-title { color: #5599ff; text-shadow: 2px 2px 0 #002299, 0 0 8px #0044ff44; }
  .java-title { color: #55ff55; text-shadow: 2px 2px 0 #005500, 0 0 8px #00ff0044; }

  .card-badge {
    margin-left: auto;
    font-size: 8px;
    padding: 3px 7px;
    border: 2px solid;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .bedrock-badge { color: #5599ff; border-color: #5599ff; }
  .java-badge { color: #55ff55; border-color: #55ff55; }

  /* Info rows */
  .info-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    font-size: 10px;
  }
  .info-label {
    color: #888;
    min-width: 38px;
    text-shadow: 1px 1px 0 #000;
  }
  .info-value {
    color: #ffff55;
    text-shadow: 1px 1px 0 #555500;
    word-break: break-all;
  }
  .copy-btn {
    margin-left: auto;
    background: none;
    border: 1px solid #555;
    color: #aaa;
    font-family: 'Minecraft', monospace;
    font-size: 8px;
    cursor: pointer;
    padding: 2px 6px;
    transition: all 0.1s;
  }
  .copy-btn:hover { background: #333; color: #fff; border-color: #888; }
  .copy-btn:active { transform: scale(0.95); }

  /* MOTD Box */
  .motd-box {
    background: #0a0a0a;
    border: 2px solid #333;
    border-top-color: #222;
    border-left-color: #222;
    padding: 10px 12px;
    margin: 12px 0;
    min-height: 52px;
    font-size: 11px;
    line-height: 1.6;
    position: relative;
    box-shadow: inset 2px 2px 4px rgba(0,0,0,0.5);
  }
  .motd-loading {
    color: #555;
    animation: blink 1s step-end infinite;
    font-size: 10px;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  .motd-line { display: block; white-space: pre-wrap; word-break: break-word; }

  /* Player bar */
  .player-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 8px 0;
    font-size: 9px;
  }
  .player-label { color: #888; }
  .player-count { color: #55ff55; }
  .player-max { color: #aaa; }
  .ping-dot {
    width: 8px; height: 8px;
    background: #55ff55;
    border-radius: 0;
    margin-left: auto;
    box-shadow: 0 0 6px #55ff55;
    animation: ping-pulse 2s ease-in-out infinite;
  }
  .ping-dot.offline { background: #ff5555; box-shadow: 0 0 6px #ff5555; animation: none; }
  @keyframes ping-pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 6px #55ff55; }
    50% { opacity: 0.6; box-shadow: 0 0 12px #55ff55; }
  }
  .ping-label { font-size: 8px; color: #888; }

  /* Health bar style player bar */
  .health-bar {
    height: 6px;
    background: #222;
    border: 1px solid #333;
    flex: 1;
    overflow: hidden;
  }
  .health-fill {
    height: 100%;
    background: #55ff55;
    transition: width 0.5s ease;
  }

  /* Buttons */
  .mc-btn {
    display: block;
    width: 100%;
    padding: 9px 12px;
    background: linear-gradient(180deg, #555 0%, #444 50%, #3a3a3a 51%, #444 100%);
    border: 2px solid #222;
    border-top-color: #777;
    border-left-color: #777;
    color: #ddd;
    font-family: 'Minecraft', monospace;
    font-size: 11px;
    text-align: center;
    cursor: pointer;
    letter-spacing: 1px;
    text-shadow: 2px 2px 0 #000;
    box-shadow: 3px 3px 0 #000, inset 0 1px 0 #888;
    margin-top: 8px;
    text-decoration: none;
    transition: transform 0.05s, filter 0.1s;
    position: relative;
    overflow: hidden;
    image-rendering: pixelated;
  }
  .mc-btn:hover {
    background: linear-gradient(180deg, #777 0%, #666 50%, #555 51%, #666 100%);
    color: #fff;
    filter: brightness(1.15);
  }
  .mc-btn:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 #000;
  }
  .mc-btn.green {
    background: linear-gradient(180deg, #2a6a1a 0%, #1e5214 50%, #183e10 51%, #1e5214 100%);
    border-top-color: #4a9a2a;
    border-left-color: #4a9a2a;
    color: #aaffaa;
  }
  .mc-btn.green:hover { background: linear-gradient(180deg, #3a8a2a 0%, #2a6a1e 50%, #1e5218 51%, #2a6a1e 100%); color: #ccffcc; }

  .mc-btn.blue {
    background: linear-gradient(180deg, #1a3a6a 0%, #142a52 50%, #0e1e3a 51%, #142a52 100%);
    border-top-color: #2a5aaa;
    border-left-color: #2a5aaa;
    color: #aaaaff;
  }
  .mc-btn.blue:hover { background: linear-gradient(180deg, #2a4a8a 0%, #1a3a62 50%, #12264a 51%, #1a3a62 100%); color: #ccccff; }

  .mc-btn.red {
    background: linear-gradient(180deg, #6a1a1a 0%, #521414 50%, #3a0e0e 51%, #521414 100%);
    border-top-color: #aa2a2a;
    border-left-color: #aa2a2a;
    color: #ffaaaa;
  }
  .mc-btn.red:hover { background: linear-gradient(180deg, #8a2a2a 0%, #6a1a1a 50%, #4a1212 51%, #6a1a1a 100%); color: #ffcccc; }

  /* Wake server section */
  .wake-section {
    margin-top: 8px;
    border-top: 1px solid #333;
    padding-top: 8px;
  }
  .wake-label {
    font-size: 8px;
    color: #555;
    text-align: center;
    margin-bottom: 4px;
    letter-spacing: 1px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: #1a1a1a;
    border: 2px solid #555;
    border-top-color: #888;
    border-left-color: #888;
    padding: 10px 20px;
    color: #55ff55;
    font-family: 'Minecraft', monospace;
    font-size: 11px;
    text-shadow: 1px 1px 0 #000;
    box-shadow: 3px 3px 0 #000;
    z-index: 9999;
    transition: transform 0.3s ease, opacity 0.3s ease;
    opacity: 0;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* Grass bottom decoration */
  .grass-bottom {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    height: 20px;
    background: repeating-linear-gradient(90deg,
      #5d9e3f 0px, #5d9e3f 16px,
      #4a7d32 16px, #4a7d32 32px
    );
    box-shadow: 0 -4px 0 #8b5a2b;
    z-index: 100;
    image-rendering: pixelated;
  }

  /* Refresh btn */
  .refresh-row {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 4px;
  }
  .refresh-tiny {
    background: none;
    border: 1px solid #333;
    color: #555;
    font-family: 'Minecraft', monospace;
    font-size: 8px;
    cursor: pointer;
    padding: 2px 6px;
    letter-spacing: 1px;
    transition: all 0.1s;
  }
  .refresh-tiny:hover { color: #aaa; border-color: #555; }

  /* Online indicator */
  .status-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 8px;
    margin-bottom: 6px;
  }
  .status-dot {
    width: 6px; height: 6px;
    background: #555;
    box-shadow: none;
  }
  .status-dot.online { background: #55ff55; box-shadow: 0 0 6px #55ff5566; }
  .status-dot.offline { background: #ff5555; }
  .status-text { color: #888; }
  .status-text.online { color: #55ff55; }
  .status-text.offline { color: #ff5555; }

  /* Version tag */
  .version-tag {
    font-size: 8px;
    color: #555;
    margin-left: auto;
    letter-spacing: 1px;
  }
</style>
</head>

<script>
// ── Minecraft color code parser ──────────────────────────────
const MC_COLORS = {
  '0': '#000000', '1': '#0000aa', '2': '#00aa00', '3': '#00aaaa',
  '4': '#aa0000', '5': '#aa00aa', '6': '#ffaa00', '7': '#aaaaaa',
  '8': '#555555', '9': '#5555ff', 'a': '#55ff55', 'b': '#55ffff',
  'c': '#ff5555', 'd': '#ff55ff', 'e': '#ffff55', 'f': '#ffffff',
};
const MC_FORMATS = {
  'l': 'font-weight:bold',
  'o': 'font-style:italic',
  'n': 'text-decoration:underline',
  'm': 'text-decoration:line-through',
};

function parseMOTD(raw) {
  if (!raw) return '<span style="color:#555">No MOTD</span>';
  // Handle array format (modern API)
  if (Array.isArray(raw)) {
    raw = raw.map(p => typeof p === 'string' ? p : (p.text || '')).join('');
  }
  if (typeof raw === 'object' && raw.text !== undefined) {
    raw = raw.text;
  }
  raw = String(raw);

  let html = '';
  let color = '#ffffff';
  let formats = [];
  let i = 0;

  while (i < raw.length) {
    if ((raw[i] === '§' || raw[i] === '\u00a7') && i + 1 < raw.length) {
      const code = raw[i + 1].toLowerCase();
      if (MC_COLORS[code]) {
        color = MC_COLORS[code];
        formats = [];
      } else if (MC_FORMATS[code]) {
        formats.push(MC_FORMATS[code]);
      } else if (code === 'r') {
        color = '#ffffff';
        formats = [];
      }
      i += 2;
    } else if (raw[i] === '\n') {
      html += '<br>';
      i++;
    } else {
      let style = `color:${color};`;
      if (formats.length) style += formats.join(';') + ';';
      const char = raw[i].replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      html += `<span style="${style}">${char}</span>`;
      i++;
    }
  }
  return html || '<span style="color:#555">No MOTD</span>';
}

// ── Fetch Java server status via mcsrvstat.us ────────────────
async function fetchJavaStatus() {
  const dot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const motd = document.getElementById('motd-content');
  const playerOnline = document.getElementById('player-online');
  const playerMax = document.getElementById('player-max');
  const playerFill = document.getElementById('player-fill');
  const pingLabel = document.getElementById('ping-label');
  const pingDot = document.getElementById('ping-dot');
  const versionTag = document.getElementById('version-tag');

  motd.className = 'motd-loading';
  motd.innerHTML = 'Pinging server...';
  dot.className = 'status-dot';
  statusText.className = 'status-text';
  statusText.textContent = 'Checking...';

  const t0 = Date.now();
  try {
    const res = await fetch('https://api.mcsrvstat.us/3/ACoolServer.aternos.me');
    const ping = Date.now() - t0;
    const data = await res.json();

    if (data.online) {
      dot.className = 'status-dot online';
      statusText.className = 'status-text online';
      statusText.textContent = 'Online';
      pingLabel.textContent = ping + 'ms';
      pingDot.className = 'ping-dot';

      // MOTD
      const rawMotd = data.motd?.raw?.[0]
        ? data.motd.raw.join('\n')
        : (data.motd?.clean?.[0] || 'A Minecraft Server');
      motd.className = 'motd-line';
      motd.innerHTML = parseMOTD(rawMotd);

      // Players
      const online = data.players?.online ?? 0;
      const max = data.players?.max ?? 0;
      playerOnline.textContent = online;
      playerMax.textContent = '/ ' + max;
      const pct = max > 0 ? Math.min(100, (online / max) * 100) : 0;
      playerFill.style.width = pct + '%';
      playerFill.style.background = pct > 80 ? '#ff5555' : pct > 50 ? '#ffaa00' : '#55ff55';

      // Version
      if (data.version) versionTag.textContent = data.version;
    } else {
      dot.className = 'status-dot offline';
      statusText.className = 'status-text offline';
      statusText.textContent = 'Offline';
      pingDot.className = 'ping-dot offline';
      pingLabel.textContent = '--ms';
      motd.className = 'motd-line';
      motd.innerHTML = '<span style="color:#ff5555">Server is offline</span><br><span style="color:#888">Try waking it up below!</span>';
      playerOnline.textContent = '0';
      playerMax.textContent = '/ 0';
      playerFill.style.width = '0%';
    }
  } catch(e) {
    dot.className = 'status-dot offline';
    statusText.textContent = 'Error';
    motd.innerHTML = '<span style="color:#ff5555">Could not reach API</span>';
  }
}

// ── Copy to clipboard ────────────────────────────────────────
function copyText(text, msg) {
  navigator.clipboard.writeText(text).then(() => showToast('✔ ' + msg));
}

// ── Toast ────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
}

// ── Wake server ──────────────────────────────────────────────
function wakeServer(type) {
  const ip = type === 'java' ? 'ACoolServer.aternos.me' : 'ACoolServerBE.aternos.me';
  showToast('⚡ Pinging ' + ip + '...');

  // Trick: open the aternos page in background to try to trigger the server
  // Also attempts a fetch ping to the server query API
  const link = document.createElement('a');
  link.href = 'https://aternos.org/server/';
  link.target = '_blank';
  link.rel = 'noopener noreferrer';

  // Attempt a query ping (this often activates aternos servers)
  fetch(`https://api.mcsrvstat.us/3/${ip}`)
    .then(r => r.json())
    .then(d => {
      if (d.online) {
        showToast('✔ Server is already online!');
        if (type === 'java') fetchJavaStatus();
      } else {
        showToast('💤 Server sleeping. Opening Aternos...');
        setTimeout(() => { window.open('https://aternos.org/server/', '_blank'); }, 800);
        setTimeout(() => showToast('👆 Log in & press Start!'), 2500);
      }
    })
    .catch(() => {
      showToast('Opening Aternos panel...');
      window.open('https://aternos.org/server/', '_blank');
    });
}

// ── Init ─────────────────────────────────────────────────────
fetchJavaStatus();
setInterval(fetchJavaStatus, 60000); // auto-refresh every 60s
</script>
