<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACoolServer</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
@font-face {
  font-family: 'Minecraft';
  src: url('Minecraft.ttf') format('truetype');
}

*{margin:0;padding:0;box-sizing:border-box;}

html,body{
height:100%;
overflow-x:hidden;
background:#0d1b2a;
font-family:'Minecraft','Press Start 2P',monospace;
color:white;
}

#stars{
position:fixed;
inset:0;
pointer-events:none;
z-index:0;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
animation:twinkle 2s infinite;
}

@keyframes twinkle{50%{opacity:0;}}

/* COMPACT LAYOUT */
.page{
position:relative;
z-index:2;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:6px;
gap:6px;
}

.title{
font-size:12px;
text-align:center;
animation:float 2s infinite ease-in-out;
text-shadow:2px 2px 0 black;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-3px);}
}

.wrapper{
width:95%;
max-width:420px;
display:flex;
flex-direction:column;
gap:6px;
padding-bottom:10px;
}

.mc-panel{
background:#c6c6c6;
border:3px solid #000;
box-shadow: inset -2px -2px 0 #555, inset 2px 2px 0 #fff;
}

.mc-header{
background:#8b8b8b;
color:black;
text-align:center;
padding:6px;
font-size:8px;
border-bottom:3px solid #000;
}

.mc-body{
background:#aaaaaa;
padding:6px;
}

.mc-row{
display:flex;
justify-content:space-between;
align-items:center;
background:#8b8b8b;
border:2px solid #000;
padding:6px;
margin-bottom:4px;
color:black;
font-size:7px;
}

.mc-btn{
background:#c6c6c6;
border:2px solid #000;
padding:4px;
font-size:6px;
font-family:'Minecraft','Press Start 2P';
}

.big-btn{
display:block;
text-align:center;
padding:6px;
margin-top:4px;
background:#c6c6c6;
border:3px solid #000;
font-size:7px;
color:black;
text-decoration:none;
}

.motd{
font-size:7px;
color:black;
margin-bottom:4px;
}

.notification{
position:fixed;
bottom:10px;
left:10px;
background:black;
color:#55ff55;
padding:6px;
font-size:7px;
display:none;
z-index:10;
}

.notification.show{display:block;}
</style>
</head>

<body>

<div id="stars"></div>

<div class="page">
<div class="title">⛏ ACOOLSERVER</div>

<div class="wrapper">

<div class="mc-panel">
<div class="mc-header">SERVER INFO</div>
<div class="mc-body">
<div id="motd" class="motd">Loading...</div>
</div>
</div>

<div class="mc-panel">
<div class="mc-header">BEDROCK</div>
<div class="mc-body">

<div class="mc-row">
<span>ACoolServerBE</span>
<button class="mc-btn" onclick="copyText('ACoolServerBE.aternos.me')">COPY</button>
</div>

<div class="mc-row">
<span>PORT 48917</span>
<button class="mc-btn" onclick="copyText('48917')">COPY</button>
</div>

<a class="big-btn" href="minecraft://?addExternalServer=ACoolServerBE|ACoolServerBE.aternos.me:48917">
ADD
</a>

</div>
</div>

<div class="mc-panel">
<div class="mc-header">JAVA</div>
<div class="mc-body">

<div class="mc-row">
<span>ACoolServer</span>
<button class="mc-btn" onclick="copyText('ACoolServer.aternos.me')">COPY</button>
</div>

<div class="mc-row">
<span>PLAYERS: <span id="players">...</span></span>
</div>

</div>
</div>

</div>
</div>

<div id="notif" class="notification">Copied!</div>

<script>
const stars=document.getElementById("stars");
for(let i=0;i<60;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";
stars.appendChild(s);
}

function copyText(t){
navigator.clipboard.writeText(t);
let n=document.getElementById("notif");
n.classList.add("show");
setTimeout(()=>n.classList.remove("show"),1200);
}

async function update(){
try{
let res=await fetch("https://api.mcsrvstat.us/2/ACoolServer.aternos.me");
let data=await res.json();

if(data.online){
document.getElementById("players").innerText=
data.players.online+"/"+data.players.max;

document.getElementById("motd").innerText="Server Online";
}else{
document.getElementById("players").innerText="OFF";
document.getElementById("motd").innerText="Offline";
}
}catch{
document.getElementById("players").innerText="ERR";
}
}

update();
setInterval(update,10000);
</script>

</body>
    </html>
